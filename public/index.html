<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RF Studio Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; max-width: 600px; padding: 2rem; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #ff6b35, #f7c948); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #888; font-size: 1.1rem; margin-bottom: 2rem; }
    .features { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin: 2rem 0; }
    .feature { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 1.5rem 1rem; }
    .feature h3 { color: #ff6b35; font-size: 0.95rem; margin-bottom: 0.5rem; }
    .feature p { color: #999; font-size: 0.8rem; line-height: 1.4; }
    .status { color: #4ade80; font-size: 0.9rem; margin-top: 2rem; }
    .dot { display: inline-block; width: 8px; height: 8px; background: #4ade80; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>RF Studio Bot</h1>
    <p class="subtitle">Ranger &amp; Fox — Unified Studio Assistant</p>
    <div class="features">
      <div class="feature">
        <h3>Deck Builder</h3>
        <p>Build custom pitch decks from Canva templates</p>
      </div>
      <div class="feature">
        <h3>Project Provisioner</h3>
        <p>Spin up projects across 8 platforms instantly</p>
      </div>
      <div class="feature">
        <h3>Script → Storyboard</h3>
        <p>Parse scripts into visual storyboards with AI</p>
      </div>
    </div>
    <p class="status"><span class="dot"></span>Bot endpoint active at /api/bot</p>
  </div>
</body>
</html>
